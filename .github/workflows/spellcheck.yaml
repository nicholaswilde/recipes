---
name: spellcheck
on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
  pull_request:
  push:
    paths:
      - 'docs/**'
      - 'mkdocs.**'
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    name: Spellcheck
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
      - name: Generate typos config
        run: python3 scripts/generate_typos_config.py
      - name: Run spellcheck
        uses: crate-ci/typos@v1
